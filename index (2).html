<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN STORE</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-bottom: 2px solid #ddd; }
        .cart-icon { font-size: 20px; cursor: pointer; position: relative; }
        .cart-count { background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; position: absolute; top: -10px; right: -10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-whatsapp { background: #25d366; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 30px; }
        .admin-panel { background: white; padding: 20px; border-radius: 10px; margin-top: 30px; border: 2px dashed #ccc; }
        .form-grid input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-save { background: #007bff; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MODERN STORE</h1>
        <div class="cart-icon">🛒 سلة التسوق <span id="cartCount" class="cart-count">0</span></div>
    </div>

    <h2 style="text-align:center;">المنتجات المميزة</h2>
    <div id="productDisplay" class="product-grid"></div>

    <button class="btn-whatsapp" onclick="sendToWhatsApp()">طلب الأوردر عبر واتساب ✅</button>

    <div id="adminPanel" class="admin-panel">
        <h3>⚙️ لوحة تحكم التاجر (إضافة منتج جديد)</h3>
        <div class="form-grid">
            <input type="text" id="pTitle" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
            <input type="text" id="pLink" placeholder="رابط صورة المنتج">
            <button class="btn-save" onclick="createNewProduct()">نشر المنتج في المتجر</button>
        </div>
    </div>

    <script>
        let cart = [];
        
        // تحميل المنتجات من الذاكرة أو استخدام القائمة الافتراضية
        let defaultProducts = [
            { id: 1, title: "هودي أسود مودرن", price: 850, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7" },
            { id: 2, title: "تيشيرت قطن بريميوم", price: 450, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" }
        ];

        let products = JSON.parse(localStorage.getItem('myStoreProducts')) || defaultProducts;

        function renderProducts() {
            const display = document.getElementById('productDisplay');
            display.innerHTML = '';
            products.forEach((item, index) => {
                display.innerHTML += `
                    <div class="product-card">
                        <img src="${item.img}" class="product-img">
                        <h3>${item.title}</h3>
                        <p>${item.price} ج.م</p>
                        <button class="btn-add" onclick="addToCart(${index})">إضافة للسلة</button>
                    </div>`;
            });
        }

        function createNewProduct() {
            const title = document.getElementById('pTitle').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pLink').value;

            if (title && price && img) {
                // إضافة المنتج الجديد للقائمة
                products.push({ id: Date.now(), title, price, img });
                
                // حفظ القائمة بالكامل في ذاكرة المتصفح
                localStorage.setItem('myStoreProducts', JSON.stringify(products));
                
                renderProducts();
                alert("تم حفظ المنتج بنجاح ولن يختفي مجدداً! ✅");
                
                document.getElementById('pTitle').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pLink').value = '';
            } else {
                alert("برجاء ملء البيانات!");
            }
        }

        function addToCart(index) {
            cart.push(products[index]);
            document.getElementById('cartCount').innerText = cart.length;
            alert("تمت الإضافة للسلة ✅");
        }

        function sendToWhatsApp() {
            if (cart.length === 0) return alert("السلة فارغة!");
            const myNumber = "201044667187";
            let msg = "أريد طلب:\n" + cart.map(i => `- ${i.title} (${i.price} ج.م)`).join("\n");
            window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderProducts();

        // إخفاء اللوحة لو مش أدمن
        if (localStorage.getItem('role') !== 'admin') {
            const panel = document.getElementById('adminPanel');
            if (panel) panel.style.display = 'none';
        }
    </script>
</body>
</html>
