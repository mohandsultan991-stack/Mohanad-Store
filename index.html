<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --primary: #000; --bg: #ffffff; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: #000; }
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }
        .cart-icon { position: relative; font-size: 1.2rem; }
        #cartCount { background: red; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; position: relative; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #f9f9f9; }
        .card-info { padding: 10px; text-align: right; }
        .card-info h3 { font-size: 0.8rem; margin: 5px 0; font-weight: bold; height: 32px; overflow: hidden; }
        .price { font-size: 0.9rem; font-weight: 900; margin-bottom: 8px; }
        .color-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background-size: cover; }
        .size-options { display: flex; gap: 4px; margin-bottom: 10px; }
        .s-btn { border: 1px solid #ddd; padding: 5px; font-size: 0.65rem; cursor: pointer; flex: 1; text-align: center; font-weight: bold; }
        .s-btn.active { background: #000; color: #fff; border-color: #000; }
        .add-to-cart { width: 100%; background: #000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 3px solid #000; z-index: 2000; width: 85%; max-width: 350px; }
        #adminPanel input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; }
        /* زر المسح السري */
        .del-btn { display: none; position: absolute; top: 5px; left: 5px; background: red; color: white; border: none; padding: 5px 10px; font-size: 12px; z-index: 10; cursor: pointer; font-weight: bold; }
        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h3 style="margin-top:0">لوحة التحكم 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط الصور (افصل بفاصلة للالوان)">
    <button onclick="uploadProduct()" style="width:100%; background:black; color:white; padding:12px; border:none; cursor:pointer; font-weight:bold;">نشر المنتج</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; background:none; color:red; border:none; margin-top:10px; cursor:pointer;">إلغاء</button>
</div>

<a href="#" id="waLink" class="checkout-bar" target="_blank">إتمام الطلب (واتساب)</a>

<script>
    const dbBase = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187"; 
    let cart = [];

    // تفعيل اللوحة السرية
    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        return "وضع التعديل نشط ✅";
    };

    async function uploadProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const imgInput = document.getElementById('pImg').value;
        if(!title || !price || !imgInput) return alert("املا البيانات!");

        await fetch(`${dbBase}.json`, {
            method: 'POST',
            body: JSON.stringify({ title, price: parseInt(price), imgs: imgInput })
        });
        location.reload();
    }

    // دالة المسح المصلحة
    async function deleteItem(id) {
        if(confirm("هل تريد مسح هذا المنتج نهائياً؟")) {
            // هنا التصليح: بنمسح من الرابط المباشر للمنتج
            const res = await fetch(`${dbBase}/${id}.json`, { method: 'DELETE' });
            if(res.ok) {
                alert("تم المسح بنجاح ✅");
                location.reload();
            } else {
                alert("حدث خطأ أثناء المسح ❌");
            }
        }
    }

    function switchImg(id, url) { document.getElementById(`img-${id}`).src = url; }

    async function loadStore() {
        const res = await fetch(`${dbBase}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data ? "" : "<p style='grid-column:1/-1;text-align:center'>المتجر فارغ حالياً.</p>";

        for (let id in data) {
            const p = data[id];
            const imgList = p.imgs.split(',');
            let dots = imgList.map(url => `<div class="color-dot" style="background-image:url('${url.trim()}')" onclick="switchImg('${id}', '${url.trim()}')"></div>`).join('');
            
            grid.innerHTML += `
                <div class="card">
                    <button class="del-btn" onclick="deleteItem('${id}')">مسح 🗑️</button>
                    <img id="img-${id}" src="${imgList[0].trim()}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div class="color-selector">${dots}</div>
                        <div class="size-options">
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','S',this)">S</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','M',this)">M</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','L',this)">L</div>
                        </div>
                        <button class="add-to-cart" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة</button>
                    </div>
                </div>`;
        }
    }

    function setSize(id, size, btn) {
        document.querySelectorAll(`.sz-${id}`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function addToCart(name, price, id) {
        const sizeBtn = document.querySelector(`.sz-${id}.active`);
        if(!sizeBtn) return alert("اختار المقاس الأول!");
        cart.push({name, price, size: sizeBtn.innerText});
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('waLink').style.display = "block";
        let total = cart.reduce((s, i) => s + i.price, 0);
        let msg = encodeURIComponent(`طلب جديد من MOHANAD STORE:\n${cart.map(i=>`- ${i.name} (${i.size})`).join('\n')}\nالإجمالي: ${total} EGP`);
        document.getElementById('waLink').href = `https://wa.me/${myPhone}?text=${msg}`;
    }
    loadStore();
</script>
</body>
</html>
