<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --primary: #000; --bg: #ffffff; --text: #000; }
        body { font-family: 'Arial Black', Gadget, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        /* الهيدر الاحترافي */
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .cart-icon { position: relative; font-size: 1.2rem; cursor: pointer; }
        #cartCount { background: red; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }

        /* جريد المنتجين جمب بعض */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; position: relative; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        
        .card-info { padding: 10px; text-align: right; }
        .card-info h3 { font-size: 0.8rem; margin: 5px 0; font-weight: bold; color: #333; height: 32px; overflow: hidden; }
        .price { font-size: 0.9rem; font-weight: 900; margin-bottom: 8px; }

        /* المقاسات */
        .size-options { display: flex; gap: 5px; margin-bottom: 10px; }
        .s-btn { border: 1px solid #ddd; padding: 5px; font-size: 0.7rem; cursor: pointer; flex: 1; text-align: center; font-weight: bold; }
        .s-btn.active { background: #000; color: #fff; border-color: #000; }

        .add-to-cart { width: 100%; background: #000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        
        /* لوحة التحكم المخفية */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 3px solid #000; z-index: 2000; width: 85%; max-width: 350px; }
        #adminPanel input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; font-family: sans-serif; }
        .del-btn { display: none; position: absolute; top: 5px; left: 5px; background: red; color: white; border: none; padding: 5px; font-size: 10px; z-index: 10; cursor: pointer; }

        /* بار إتمام الطلب */
        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-weight: bold; display: none; z-index: 1000; border-radius: 0; }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid">
    <p style="grid-column: 1/-1; text-align: center;">جاري تحميل المنتجات...</p>
</div>

<div id="adminPanel">
    <h2 style="margin-top:0">لوحة التاجر ⚡</h2>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط الصورة">
    <button onclick="uploadProduct()" style="width:100%; background:black; color:white; padding:12px; border:none; cursor:pointer; font-weight:bold;">نشر الآن</button>
    <button onclick="closeAdmin()" style="width:100%; background:none; color:red; border:none; margin-top:10px; cursor:pointer;">إلغاء</button>
</div>

<a href="#" id="waLink" class="checkout-bar" target="_blank">إتمام الطلب (واتساب)</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products.json";
    const myPhone = "201044667187"; 
    let cart = [];

    // السر: اكتب show() في الكونسول
    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        return "أهلاً يا مهند! وضع التعديل جاهز.";
    };

    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    async function uploadProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;

        if(!title || !price || !img) return alert("كمل البيانات يا بطل!");

        await fetch(dbURL, {
            method: 'POST',
            body: JSON.stringify({ title, price: parseInt(price), img: img })
        });
        alert("✅ تمت الإضافة بنجاح!");
        location.reload();
    }

    async function deleteItem(id) {
        if(confirm("مسح المنتج؟")) {
            await fetch(`https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    function setSize(id, size, btn) {
        document.querySelectorAll(`.sz-${id}`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function loadStore() {
        const res = await fetch(dbURL);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data ? "" : "<p style='grid-column:1/-1; text-align:center;'>المتجر فاضي حالياً.</p>";

        for (let id in data) {
            const p = data[id];
            grid.innerHTML += `
                <div class="card">
                    <button class="del-btn" onclick="deleteItem('${id}')">X</button>
                    <img src="${p.img}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div class="size-options">
                            <div class="s-btn sz-${id}" onclick="setSize('${id}', 'S', this)">S</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}', 'M', this)">M</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}', 'L', this)">L</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}', 'XL', this)">XL</div>
                        </div>
                        <button class="add-to-cart" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة</button>
                    </div>
                </div>`;
        }
    }

    function addToCart(name, price, id) {
        const sizeBtn = document.querySelector(`.sz-${id}.active`);
        if(!sizeBtn) return alert("اختار المقاس الأول!");

        cart.push({name, price, size: sizeBtn.innerText});
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('waLink').style.display = "block";
        
        let total = cart.reduce((s, i) => s + i.price, 0);
        let details = cart.map(i => `- ${i.name} (مقاس: ${i.size})`).join('\n');
        let msg = encodeURIComponent(`طلب جديد من MOHANAD STORE:\n\n${details}\n\nالإجمالي: ${total} EGP`);
        document.getElementById('waLink').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    loadStore();
</script>
</body>
</html>
