<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --primary: #e11d48; --bg: #ffffff; --card-bg: #f9fafb; --text: #111827; --gray: #6b7280; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #eee; sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 3px; font-weight: 800; text-transform: uppercase; }

        /* جريد المنتجين جمب بعض */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        
        .card { background: #fff; position: relative; display: flex; flex-direction: column; border: 1px solid #f3f4f6; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #f9fafb; }
        
        .card-info { padding: 12px; text-align: right; }
        .card-info h3 { font-size: 0.85rem; margin: 5px 0; font-weight: 600; color: #374151; height: 35px; overflow: hidden; }
        .price { font-size: 1rem; color: #000; font-weight: 800; margin: 5px 0; }

        /* الألوان والمقاسات */
        .color-dots { display: flex; gap: 6px; margin: 8px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #e5e7eb; cursor: pointer; background-size: cover; }
        
        .size-grid { display: flex; gap: 4px; margin: 10px 0; flex-wrap: wrap; }
        .size-btn { border: 1px solid #e5e7eb; padding: 4px 8px; font-size: 0.7rem; cursor: pointer; background: #fff; min-width: 30px; text-align: center; }
        .size-btn.active { background: #000; color: #fff; border-color: #000; }

        .buy-now { width: 100%; background: #000; color: #fff; border: none; padding: 10px; font-weight: bold; cursor: pointer; font-size: 0.8rem; margin-top: 5px; }

        /* لوحة التحكم السرية */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 2px solid #000; z-index: 2000; width: 85%; max-width: 350px; }
        #adminPanel input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .delete-mark { display: none; position: absolute; top: 5px; left: 5px; background: red; color: white; border: none; padding: 5px 8px; font-size: 10px; cursor: pointer; z-index: 20; }

        .checkout-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 30px; border-radius: 2px; text-decoration: none; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
</header>

<div class="container" id="productsGrid">
    <p style="text-align: center; grid-column: 1/-1;">جاري تجهيز المتجر...</p>
</div>

<div id="adminPanel">
    <h2 style="margin-top:0; font-size: 1.1rem;">إضافة منتج جديد 👕</h2>
    <input type="text" id="pTitle" placeholder="اسم المنتج (مثلاً: تيشيرت أوفر سايز)">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="img1" placeholder="رابط الصورة 1 (الأساسية)">
    <input type="text" id="img2" placeholder="رابط الصورة 2 (اختياري)">
    <input type="text" id="img3" placeholder="رابط الصورة 3 (اختياري)">
    <button onclick="uploadProduct()" style="width:100%; background:black; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold;">حفظ ونشر المنتج</button>
    <button onclick="closeAdmin()" style="width:100%; background:none; color:red; border:none; margin-top:10px; cursor:pointer;">إلغاء</button>
</div>

<a href="#" id="whatsappLink" class="checkout-btn" target="_blank">إتمام الطلب عبر واتساب</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products.json";
    const myPhone = "201044667187"; 
    let cart = [];

    // دالة الفتح السرية (اكتب show() في الكونسول)
    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.delete-mark').forEach(el => el.style.display = 'block');
        return "أهلاً بك في لوحة تحكم مهند ستور ✅";
    };

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.delete-mark').forEach(el => el.style.display = 'none');
    }

    async function uploadProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const imgs = [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value].filter(url => url.trim() !== "");

        if(!title || !price || imgs.length === 0) return alert("من فضلك ادخل الاسم والسعر وصورة واحدة على الأقل");

        await fetch(dbURL, {
            method: 'POST',
            body: JSON.stringify({ title, price: parseInt(price), images: imgs })
        });
        location.reload();
    }

    async function deleteItem(id) {
        if(confirm("هل أنت متأكد من مسح هذا المنتج؟")) {
            await fetch(`https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    function switchImg(id, url) {
        document.getElementById(`img-main-${id}`).src = url;
    }

    function setSize(id, size, btn) {
        document.querySelectorAll(`.btns-${id}`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        btn.dataset.val = size;
    }

    async function loadStore() {
        const res = await fetch(dbURL);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = "";

        if(!data) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>المتجر فارغ حالياً.</p>";
            return;
        }

        for (let id in data) {
            const p = data[id];
            let dots = p.images.map(url => `<div class="dot" style="background-image:url('${url}')" onclick="switchImg('${id}', '${url}')"></div>`).join('');
            
            grid.innerHTML += `
                <div class="card">
                    <button class="delete-mark" onclick="deleteItem('${id}')">مسح</button>
                    <img id="img-main-${id}" src="${p.images[0]}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div class="color-dots">${dots}</div>
                        <div class="size-grid">
                            <div class="size-btn btns-${id}" onclick="setSize('${id}', 'S', this)">S</div>
                            <div class="size-btn btns-${id}" onclick="setSize('${id}', 'M', this)">M</div>
                            <div class="size-btn btns-${id}" onclick="setSize('${id}', 'L', this)">L</div>
                            <div class="size-btn btns-${id}" onclick="setSize('${id}', 'XL', this)">XL</div>
                        </div>
                        <button class="buy-now" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للحقيبة</button>
                    </div>
                </div>`;
        }
    }

    function addToCart(name, price, id) {
        const sizeBtn = document.querySelector(`.btns-${id}.active`);
        if(!sizeBtn) return alert("يجب اختيار المقاس أولاً");

        const size = sizeBtn.innerText;
        cart.push({name, price, size});
        
        document.getElementById('whatsappLink').style.display = "block";
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        let orderDetails = cart.map(i => `- ${i.name} (مقاس: ${i.size})`).join('\n');
        
        let msg = encodeURIComponent(`طلب جديد من المتجر:\n\n${orderDetails}\n\nالإجمالي: ${total} جنيه`);
        document.getElementById('whatsappLink').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    loadStore();
</script>
</body>
</html>
