<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE | المتجر الرسمي</title>
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        header h1 { color: var(--primary); margin: 0; user-select: none; font-size: 1.5rem; }
        .cart-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 50px; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; flex-grow: 1; }
        .price { font-size: 1.4rem; color: var(--primary); font-weight: bold; margin: 10px 0; }
        
        /* شكل قائمة المقاسات */
        .size-selector { width: 100%; padding: 8px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--primary); margin-bottom: 10px; cursor: pointer; }

        .btn-buy { width: 100%; background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { background: var(--primary); color: white; }
        
        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 10; }

        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.9); z-index: 2000; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        #adminPanel input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 15px 30px; border-radius: 50px; display: none; color: white; font-weight: bold; text-decoration: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <div class="cart-btn">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h2 style="color: var(--primary); margin-top:0">لوحة التاجر 🕵️‍♂️</h2>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط الصورة">
    <button onclick="uploadProduct()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">إضافة المنتج</button>
    <button onclick="hideAdmin()" style="width:100%; background:none; color:#94a3b8; border:none; margin-top:10px; cursor:pointer;">إغلاق اللوحة</button>
</div>

<a href="#" id="whatsappBtn" class="checkout-bar" target="_blank">إتمام الطلب عبر واتساب</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187"; 
    let cart = [];

    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'block');
        return "وضع التعديل نشط ✅";
    };

    function hideAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
    }

    async function uploadProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(!title || !price || !img) return alert("املا البيانات!");

        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify({ title, price: parseInt(price), img }) });
        location.reload();
    }

    async function deleteProduct(id) {
        if(confirm("مسح المنتج؟")) {
            await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    async function fetchProducts() {
        const res = await fetch(`${dbURL}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data ? "" : "<p style='text-align:center; grid-column:1/-1'>المحل فاضي..</p>";
        
        for (let id in data) {
            const p = data[id];
            grid.innerHTML += `
                <div class="card">
                    <button class="delete-btn" onclick="deleteProduct('${id}')">مسح 🗑️</button>
                    <img src="${p.img}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <p class="price">${p.price} ج.م</p>
                        
                        <select id="size-${id}" class="size-selector">
                            <option value="S">Small (S)</option>
                            <option value="M">Medium (M)</option>
                            <option value="L">Large (L)</option>
                            <option value="XL">X-Large (XL)</option>
                            <option value="XXL">XX-Large (XXL)</option>
                        </select>

                        <button class="btn-buy" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة +</button>
                    </div>
                </div>`;
        }
    }

    function addToCart(t, p, id) {
        // سحب المقاس المختار
        const selectedSize = document.getElementById(`size-${id}`).value;
        
        cart.push({t, p, s: selectedSize});
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('whatsappBtn').style.display = "block";
        
        let total = cart.reduce((total, item) => total + item.p, 0);
        let msg = encodeURIComponent("طلب جديد من MOHANAD STORE:\n\n" + 
                  cart.map(i => `- ${i.t} (مقاس: ${i.s}) [${i.p} ج.م]`).join("\n") + 
                  "\n\nالمجموع الكلي: " + total + " ج.م");
                  
        document.getElementById('whatsappBtn').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    fetchProducts();
</script>
</body>
</html>
