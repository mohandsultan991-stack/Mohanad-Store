<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --main: #000; --bg: #ffffff; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--main); }
        
        header { background: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; text-align: right; }
        .cart-icon { position: relative; font-size: 1.1rem; background: #eee; padding: 5px 12px; border: 2px solid #000; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; position: relative; border: 1px solid #eee; }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #f9f9f9; }
        
        .card-info { padding: 10px; text-align: right; }
        .card-info h3 { font-size: 0.8rem; margin: 5px 0; font-weight: bold; height: 32px; overflow: hidden; }
        .price { font-size: 1rem; font-weight: 900; margin-bottom: 10px; }

        /* دوائر الألوان */
        .color-selector { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; background-size: cover; background-position: center; transition: 0.2s; }
        .dot:hover { border-color: #000; }

        /* المقاسات من L لـ XXL */
        .size-grid { display: flex; gap: 5px; margin-bottom: 12px; }
        .s-btn { border: 1px solid #ddd; padding: 6px; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; font-weight: 900; }
        .s-btn.active { background: #000; color: #fff; border-color: #000; }

        .buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 4px solid #000; z-index: 2000; width: 85%; max-width: 350px; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        #adminPanel input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #000; box-sizing: border-box; }
        .del-mark { display: none; position: absolute; top: 5px; left: 5px; background: red; color: white; border: none; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: bold; z-index: 10; }

        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-weight: bold; display: none; z-index: 1000; border: 2px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h3 style="margin-top:0">لوحة تحكم مهند 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="روابط الصور (افصل بفاصلة ,)">
    <p style="font-size: 10px; color: gray; margin: 0 0 10px;">مثال: رابط1 , رابط2 , رابط3</p>
    <button onclick="uploadItem()" style="width:100%; background:black; color:white; padding:12px; border:none; cursor:pointer; font-weight:bold;">نشر في المتجر</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; background:none; color:red; border:none; margin-top:10px; cursor:pointer;">إلغاء</button>
</div>

<a href="#" id="waLink" class="checkout-bar" target="_blank">إتمام الطلب (واتساب)</a>

<script>
    const dbBase = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187"; 
    let cart = [];

    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.del-mark').forEach(b => b.style.display = 'block');
        return "وضع التعديل نشط ✅";
    };

    async function uploadItem() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const imgsStr = document.getElementById('pImg').value;
        if(!title || !price || !imgsStr) return alert("املا كل الخانات!");

        await fetch(`${dbBase}.json`, {
            method: 'POST',
            body: JSON.stringify({ title, price: parseInt(price), imgs: imgsStr })
        });
        alert("تمت الإضافة بنجاح!");
        location.reload();
    }

    async function deleteItem(id) {
        if(confirm("هل تريد مسح المنتج نهائياً؟")) {
            await fetch(`${dbBase}/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    function changeImg(id, url) {
        document.getElementById(`img-${id}`).src = url;
    }

    async function loadStore() {
        const res = await fetch(`${dbBase}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = "";

        if(!data) {
            grid.innerHTML = "<p style='grid-column:1/-1;text-align:center'>المتجر فارغ حالياً.</p>";
            return;
        }

        for (let id in data) {
            const p = data[id];
            const imgArray = p.imgs ? p.imgs.split(',').map(s => s.trim()) : [];
            let dots = imgArray.length > 1 ? imgArray.map(url => `<div class="dot" style="background-image:url('${url}')" onclick="changeImg('${id}', '${url}')"></div>`).join('') : "";
            
            grid.innerHTML += `
                <div class="card">
                    <button class="del-mark" onclick="deleteItem('${id}')">X</button>
                    <img id="img-${id}" src="${imgArray[0]}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div class="color-selector">${dots}</div>
                        <div class="size-grid">
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','L',this)">L</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','XL',this)">XL</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','XXL',this)">XXL</div>
                        </div>
                        <button class="buy-btn" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة</button>
                    </div>
                </div>`;
        }
    }

    function setSize(id, size, btn) {
        document.querySelectorAll(`.sz-${id}`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function addToCart(name, price, id) {
        const sizeBtn = document.querySelector(`.sz-${id}.active`);
        if(!sizeBtn) return alert("اختار المقاس الأول!");
        
        cart.push({name, price, size: sizeBtn.innerText});
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('waLink').style.display = "block";
        
        let total = cart.reduce((s,i) => s + i.price, 0);
        let order = cart.map(i => `- ${i.name} (${i.size})`).join('\n');
        let msg = encodeURIComponent(`طلب جديد من MOHANAD STORE:\n\n${order}\n\nالإجمالي: ${total} EGP`);
        document.getElementById('waLink').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    loadStore();
</script>
</body>
</html>
