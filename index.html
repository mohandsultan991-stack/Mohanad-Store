<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --primary: #e11d48; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --gray: #64748b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        header { background: #ffffff; padding: 15px; text-align: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        header h1 { color: #000; margin: 0; font-size: 1.2rem; letter-spacing: 2px; }
        
        /* تصميم المنتجين جمب بعض */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 0px; overflow: hidden; position: relative; transition: 0.3s; }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #f1f5f9; }
        
        .card-info { padding: 10px; text-align: right; }
        .card-info h3 { font-size: 0.9rem; margin: 5px 0; font-weight: 500; color: var(--gray); }
        .price { font-size: 1rem; color: #000; font-weight: bold; margin-bottom: 10px; }

        /* تصميم المقاسات (مربعات) */
        .size-container { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .size-box { border: 1px solid #e2e8f0; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; background: #fff; color: #000; }
        .size-box.active { border-color: #000; background: #f1f5f9; font-weight: bold; }

        /* تصميم دوائر الألوان */
        .color-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.2); }

        .btn-buy { width: 100%; background: #000; color: #fff; border: none; padding: 10px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        
        .delete-btn { display: none; position: absolute; top: 5px; right: 5px; background: rgba(225, 29, 72, 0.9); color: white; border: none; padding: 5px; border-radius: 3px; font-size: 10px; z-index: 10; }

        /* لوحة التاجر المتطورة */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.2); z-index: 2000; width: 90%; max-width: 400px; color: #000; border-top: 5px solid var(--primary); }
        #adminPanel input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .checkout-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #000; padding: 12px 25px; border-radius: 5px; display: none; color: #fff; font-size: 0.9rem; text-decoration: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h3>لوحة التحكم الاحترافية 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="img1" placeholder="رابط الصورة 1 (الأساسية)">
    <input type="text" id="img2" placeholder="رابط الصورة 2 (اختياري)">
    <input type="text" id="img3" placeholder="رابط الصورة 3 (اختياري)">
    <button onclick="uploadProduct()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; cursor:pointer;">نشر المنتج</button>
    <button onclick="hideAdmin()" style="width:100%; background:none; color:red; border:none; margin-top:10px; cursor:pointer;">إغلاق</button>
</div>

<a href="#" id="whatsappBtn" class="checkout-bar" target="_blank">إرسال الطلب (واتساب)</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187"; // رقمك الجديد
    let cart = [];

    window.show = function() {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
        return "أهلاً مهند، المتجر تحت أمرك!";
    };

    function hideAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');
    }

    async function uploadProduct() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const images = [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value].filter(i => i !== "");
        
        if(!title || !price || images.length === 0) return alert("املا البيانات!");

        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify({ title, price: parseInt(price), images }) });
        location.reload();
    }

    async function deleteProduct(id) {
        if(confirm("مسح؟")) {
            await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    function changeImg(id, url) {
        document.getElementById(`mainImg-${id}`).src = url;
    }

    function selectSize(id, size, el) {
        document.querySelectorAll(`.size-group-${id}`).forEach(box => box.classList.remove('active'));
        el.classList.add('active');
        el.dataset.selected = size;
    }

    async function fetchProducts() {
        const res = await fetch(`${dbURL}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = "";
        
        for (let id in data) {
            const p = data[id];
            let colorDots = p.images.map(img => `<div class="color-dot" style="background: url('${img}'); background-size:cover" onclick="changeImg('${id}', '${img}')"></div>`).join('');
            
            grid.innerHTML += `
                <div class="card">
                    <button class="delete-btn" onclick="deleteProduct('${id}')">X</button>
                    <img id="mainImg-${id}" src="${p.images[0]}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        
                        <div class="color-container">${colorDots}</div>

                        <div class="size-container" id="size-container-${id}">
                            <div class="size-box size-group-${id}" onclick="selectSize('${id}', 'S', this)">S</div>
                            <div class="size-box size-group-${id}" onclick="selectSize('${id}', 'M', this)">M</div>
                            <div class="size-box size-group-${id}" onclick="selectSize('${id}', 'L', this)">L</div>
                            <div class="size-box size-group-${id}" onclick="selectSize('${id}', 'XL', this)">XL</div>
                        </div>

                        <button class="btn-buy" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة</button>
                    </div>
                </div>`;
        }
    }

    function addToCart(t, p, id) {
        let sizeActive = document.querySelector(`.size-group-${id}.active`);
        if(!sizeActive) return alert("اختار المقاس الأول يا بطل!");
        
        let size = sizeActive.innerText;
        cart.push({t, p, s: size});
        
        document.getElementById('whatsappBtn').style.display = "block";
        let total = cart.reduce((s, i) => s + i.p, 0);
        let msg = encodeURIComponent("طلب جديد من MOHANAD STORE:\n\n" + cart.map(i => `- ${i.t} (مقاس: ${i.s})`).join("\n") + "\n\nالإجمالي: " + total + " ج.م");
        document.getElementById('whatsappBtn').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    fetchProducts();
</script>
</body>
</html>
