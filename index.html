<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --main: #000; --bg: #ffffff; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--main); }
        
        header { background: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 900; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #fff; position: relative; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        
        .card-info { padding: 10px; text-align: right; }
        .card-info h3 { font-size: 0.85rem; margin: 5px 0; font-weight: bold; }
        .price { font-size: 1rem; font-weight: 900; margin-bottom: 8px; }

        /* دوائر الألوان الملونة */
        .color-selector { display: flex; gap: 8px; margin: 10px 0; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .color-dot.active { border-color: #000; transform: scale(1.2); }
        
        /* المقاسات مترتبة: L - XL - XXL */
        .size-grid { display: flex; gap: 5px; margin-bottom: 12px; }
        .s-btn { border: 1px solid #ddd; padding: 6px; font-size: 0.75rem; cursor: pointer; flex: 1; text-align: center; font-weight: bold; border-radius: 4px; }
        .s-btn.active { background: #000; color: #fff; border-color: #000; }

        .buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 4px solid #000; z-index: 2000; width: 85%; max-width: 350px; border-radius: 15px; }
        #adminPanel input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; border-radius: 5px; }
        .del-btn { display: none; position: absolute; top: 5px; left: 5px; background: red; color: white; border: none; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 50%; z-index: 10; }

        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-weight: bold; border-radius: 50px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h3>إضافة منتج 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط الصورة (مباشر)">
    <input type="text" id="pColors" placeholder="الألوان (black, white, red)">
    <button onclick="uploadItem()" style="width:100%; background:black; color:white; padding:12px; border:none; cursor:pointer; font-weight:bold;">نشر المنتج</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; background:none; color:red; border:none; margin-top:10px;">إلغاء</button>
</div>

<a href="#" id="waLink" class="checkout-bar" target="_blank">إتمام الطلب (واتساب)</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187"; 
    let cart = [];

    // لفتح لوحة التحكم اكتب show() في الـ Console
    window.show = () => {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        return "Admin Panel Active";
    };

    async function uploadItem() {
        const title = document.getElementById('pTitle').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        const colors = document.getElementById('pColors').value;
        
        if(!title || !price || !img) return alert("املا البيانات!");

        await fetch(`${dbURL}.json`, {
            method: 'POST',
            body: JSON.stringify({ title, price: parseInt(price), img, colors })
        });
        location.reload();
    }

    async function deleteItem(id) {
        if(confirm("مسح؟")) {
            await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = "";

        if(!data) return;

        for (let id in data) {
            const p = data[id];
            const colorArray = p.colors ? p.colors.split(',') : [];
            let colorDots = colorArray.map(c => `<div class="color-dot c-${id}" style="background:${c.trim()}" onclick="setColor('${id}','${c.trim()}',this)"></div>`).join('');

            grid.innerHTML += `
                <div class="card">
                    <button class="del-btn" onclick="deleteItem('${id}')">✕</button>
                    <img src="${p.img}">
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div class="color-selector">${colorDots}</div>
                        <div class="size-grid">
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','L',this)">L</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','XL',this)">XL</div>
                            <div class="s-btn sz-${id}" onclick="setSize('${id}','XXL',this)">XXL</div>
                        </div>
                        <button class="buy-btn" onclick="addToCart('${p.title}', ${p.price}, '${id}')">إضافة للسلة</button>
                    </div>
                </div>`;
        }
    }

    function setColor(id, color, el) {
        document.querySelectorAll(`.c-${id}`).forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        el.dataset.chosenColor = color;
    }

    function setSize(id, size, el) {
        document.querySelectorAll(`.sz-${id}`).forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function addToCart(name, price, id) {
        const sizeBtn = document.querySelector(`.sz-${id}.active`);
        const colorDot = document.querySelector(`.c-${id}.active`);
        if(!sizeBtn) return alert("اختار المقاس!");
        
        const color = colorDot ? colorDot.dataset.chosenColor : "لم يتم تحديد لون";
        cart.push({name, price, size: sizeBtn.innerText, color});
        
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('waLink').style.display = "block";
        
        let msg = encodeURIComponent(`طلب جديد من المتجر:\n${cart.map(i=>`- ${i.name} (مقاس: ${i.size}) (لون: ${i.color})`).join('\n')}\nالإجمالي: ${cart.reduce((a,b)=>a+b.price,0)} EGP`);
        document.getElementById('waLink').href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    loadStore();
</script>
</body>
</html>
