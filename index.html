<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root { --main: #000; --bg: #ffffff; --accent: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--main); overflow-x: hidden; }
        
        /* الواجهة الرئيسية */
        .hero {
            width: 100%; height: 100vh; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-align: center;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-size: 3rem; margin: 0; }
        .scroll-down { margin-top: 20px; animation: bounce 2s infinite; font-size: 0.9rem; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }

        header { background: #fff; padding: 15px 20px; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px 12px; max-width: 800px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; cursor: pointer; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 10px; text-align: right; }
        .price { font-weight: 900; color: #d00; }

        .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--main); color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 1000; }
        .cart-count { position: absolute; top: 0; left: 0; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        .product-modal, .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; opacity: 0; transition: 0.3s; }
        .show { display: block !important; opacity: 1; }
        .close-modal { font-size: 2rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; background: #eee; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .slider-container { width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 450px; object-fit: contain; }
        .dots-container { display: flex; justify-content: center; gap: 6px; padding: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #000; width: 18px; border-radius: 10px; }

        .details-content { padding: 20px; text-align: right; }
        .size-btn { border: 1.5px solid #ddd; padding: 10px 15px; cursor: pointer; border-radius: 8px; display: inline-block; margin: 5px; font-weight: bold; }
        .size-btn.active { background: #000; color: #fff; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; display: inline-block; margin-left: 10px; cursor: pointer; }
        .color-dot.active { border: 2px solid #000; transform: scale(1.1); }

        .shipping-form input, .shipping-form select, .shipping-form textarea { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 10px; font-family: inherit; }
        .add-btn { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .wa-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }

        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border: 2px solid #000; z-index: 3000; width: 90%; max-width: 400px; border-radius: 15px; }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="hero">
    <h1>MOHANAD STORE</h1>
    <p>Collection 2026</p>
    <div class="scroll-down">اسحب لتصفح المنتجات ↓</div>
</div>

<header>
    <button id="delBtn" style="display:none; background:red; color:#fff; border:none; padding:5px 10px; border-radius:5px;" onclick="deleteSelected()">حذف 🗑️</button>
    <h2 style="margin:0; font-size: 1.1rem;">كل المنتجات</h2>
</header>

<div class="container" id="productsGrid"></div>

<div class="cart-float" onclick="openCart()">
    🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<div id="cartModal" class="cart-modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 20px; text-align: right; margin-top: 50px;">
        <h2>سلة المشتريات 🛍️</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin: 20px 0; font-weight: 900; font-size: 1.3rem;"></div>
        <div class="shipping-form" id="shippingSection" style="display:none;">
            <input type="text" id="cName" placeholder="الاسم بالكامل">
            <input type="tel" id="cPhone" placeholder="رقم الموبايل">
            <select id="cCity">
                <option value="">اختر المحافظة</option>
                <option>القاهرة</option><option>الجيزة</option><option>الإسكندرية</option><option>الدقهلية</option>
                <option>البحر الأحمر</option><option>البحيرة</option><option>الفيوم</option><option>الغربية</option>
                <option>الإسماعيلية</option><option>المنوفية</option><option>المنيا</option><option>القليوبية</option>
                <option>الوادي الجديد</option><option>السويس</option><option>الشرقية</option><option>أسوان</option>
                <option>أسيوط</option><option>بني سويف</option><option>بورسعيد</option><option>دمياط</option>
                <option>جنوب سيناء</option><option>كفر الشيخ</option><option>مطروح</option><option>الأقصر</option>
                <option>قنا</option><option>شمال سيناء</option><option>سوهاج</option>
            </select>
            <textarea id="cAddr" rows="2" placeholder="العنوان بالتفصيل"></textarea>
            <button class="wa-btn" onclick="sendOrder()">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>
</div>

<div id="productModal" class="product-modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="slider-container" id="imageSlider" onscroll="updateDots()"></div>
    <div id="dotsContainer" class="dots-container"></div>
    <div class="details-content">
        <h2 id="mTitle"></h2>
        <p id="mPrice" style="font-size:1.5rem; font-weight:900; color:#d00;"></p>
        <div id="mDesc" style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:15px;"></div>
        <p>اللون:</p><div id="mColors"></div>
        <p style="margin-top:15px">المقاس:</p><div id="mSizes"></div>
        <p style="margin-top:15px">الكمية:</p>
        <input type="number" id="mQty" value="1" min="1" style="width:60px; padding:8px; border-radius:5px; border:1px solid #ddd;">
        <button class="add-btn" style="margin-top:20px" onclick="addToCart()">إضافة للسلة 🛒</button>
    </div>
</div>

<div id="adminPanel">
    <h3>إضافة منتج 🛠️</h3>
    <input type="text" id="pTitle" placeholder="الاسم">
    <input type="number" id="pPrice" placeholder="السعر">
    <textarea id="pImgs" placeholder="روابط الصور (كل رابط في سطر)"></textarea>
    <textarea id="pDesc" placeholder="الوصف"></textarea>
    <input type="text" id="pColors" placeholder="الألوان (مثال: red, black)">
    <input type="text" id="pSizes" placeholder="المقاسات (مثال: M, L, XL)">
    <button onclick="saveProduct()" style="width:100%; background:#000; color:#fff; padding:10px; border:none; border-radius:5px;">حفظ</button>
</div>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187";
    
    let cart = JSON.parse(localStorage.getItem('mohanad_cart')) || [];
    let currentP = null, selCol = "", selSiz = "";

    window.onload = () => { updateCartUI(); loadStore(); };
    window.addEventListener('popstate', () => { closeModal(); closeCart(); });

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = "";
        if(!data) return;
        for (let id in data) {
            const p = data[id];
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openProduct(p, id);
            card.innerHTML = `
                <input type="checkbox" class="admin-check" value="${id}" style="display:none; position:absolute; top:10px; right:10px; z-index:5;" onclick="event.stopPropagation()">
                <img src="${p.imgs ? p.imgs[0] : ''}">
                <div class="card-info"><h3>${p.title}</h3><div class="price">${p.price} EGP</div></div>
            `;
            grid.appendChild(card);
        }
    }

    function openProduct(p, id) {
        currentP = p; selCol = ""; selSiz = "";
        document.getElementById('imageSlider').innerHTML = p.imgs.map(u => `<img src="${u}">`).join('');
        document.getElementById('dotsContainer').innerHTML = p.imgs.map((_,i) => `<div class="dot ${i==0?'active':''}"></div>`).join('');
        document.getElementById('mTitle').innerText = p.title;
        document.getElementById('mPrice').innerText = p.price + " EGP";
        document.getElementById('mDesc').innerText = p.desc || "";
        document.getElementById('mColors').innerHTML = p.colors ? p.colors.split(',').map(c => `<div class="color-dot" style="background:${c.trim()}" onclick="selCol='${c.trim()}';document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));this.classList.add('active')"></div>`).join('') : '';
        document.getElementById('mSizes').innerHTML = p.sizes ? p.sizes.split(',').map(s => `<div class="size-btn" onclick="selSiz='${s.trim()}';document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${s.trim()}</div>`).join('') : '';
        document.getElementById('mQty').value = 1;
        document.getElementById('productModal').classList.add('show');
        history.pushState({p:1}, "");
    }

    function addToCart() {
        const qty = parseInt(document.getElementById('mQty').value);
        if(!selCol || !selSiz || qty < 1) return alert("اختار اللون والمقاس!");
        cart.push({ id: Date.now(), title: currentP.title, price: currentP.price, color: selCol, size: selSiz, qty, img: currentP.imgs[0] });
        localStorage.setItem('mohanad_cart', JSON.stringify(cart));
        updateCartUI();
        alert("تمت الإضافة!");
        closeModal();
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        const itemsDiv = document.getElementById('cartItems');
        let total = 0; itemsDiv.innerHTML = "";
        cart.forEach(item => {
            total += (item.price * item.qty);
            itemsDiv.innerHTML += `<div class="cart-item"><img src="${item.img}"><div style="flex:1"><b>${item.title}</b><br><small>${item.color} | ${item.size} | ع:${item.qty}</small></div><div style="color:red" onclick="removeItem(${item.id})">🗑️</div></div>`;
        });
        document.getElementById('cartTotal').innerText = total > 0 ? "الإجمالي: " + total + " EGP" : "السلة فاضية";
        document.getElementById('shippingSection').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        localStorage.setItem('mohanad_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function sendOrder() {
        const n = document.getElementById('cName').value, ph = document.getElementById('cPhone').value, city = document.getElementById('cCity').value, addr = document.getElementById('cAddr').value;
        if(!n || !ph || !city || !addr) return alert("اكمل البيانات!");
        let items = cart.map((it, i) => `${i+1}- ${it.title} (${it.color}/${it.size}) ع:${it.qty}`).join('\n');
        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const msg = `طلب جديد 🔥\n\nالمنتجات:\n${items}\n\nالإجمالي: ${total} EGP\n\nالاسم: ${n}\nموبايل: ${ph}\nالمحافظة: ${city}\nالعنوان: ${addr}`;
        window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`);
        cart = []; localStorage.removeItem('mohanad_cart'); updateCartUI(); closeCart();
    }

    function closeModal() { document.getElementById('productModal').classList.remove('show'); }
    function openCart() { document.getElementById('cartModal').classList.add('show'); history.pushState({c:1}, ""); }
    function closeCart() { document.getElementById('cartModal').classList.remove('show'); }
    function updateDots() {
        const s = document.getElementById('imageSlider'); const dots = document.querySelectorAll('.dot');
        const i = Math.round(s.scrollLeft / s.offsetWidth);
        dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    }

    window.show = function() {
        let p = prompt("Pass:");
        if(p === "123") {
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('delBtn').style.display='block';
            document.querySelectorAll('.admin-check').forEach(c => c.style.display='block');
            return "Admin Mode";
        }
    };

    async function saveProduct() {
        const data = { 
            title: document.getElementById('pTitle').value, 
            price: document.getElementById('pPrice').value, 
            imgs: document.getElementById('pImgs').value.split('\n').filter(u => u.trim() !== ""), 
            desc: document.getElementById('pDesc').value, 
            colors: document.getElementById('pColors').value, 
            sizes: document.getElementById('pSizes').value 
        };
        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify(data) });
        location.reload();
    }

    async function deleteSelected() {
        const sel = document.querySelectorAll('.admin-check:checked');
        if(sel.length === 0) return alert("حدد منتج!");
        if(confirm("حذف؟")) {
            for (let b of sel) await fetch(`${dbURL}/${b.value}.json`, { method: 'DELETE' });
            location.reload();
        }
    }
</script>
</body>
</html>
